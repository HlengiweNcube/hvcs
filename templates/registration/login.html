{% extends "base.html" %}
{% block title %}HVCS Login{% endblock %}
{% block main_class %}page page--narrow{% endblock %}
{% block content %}
    <h1 class="page-title">HVCS Login</h1>
    {% if form.errors %}
        <p class="error-text">Invalid username or password.</p>
    {% endif %}
    <form method="post" class="form-shell">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button">Sign in</button>
    </form>
{% endblock %}
