<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients</title>
</head>
<body>
    <h1>Clients</h1>
    <p><a href="/accounts/admin-dashboard/">Back to Admin Dashboard</a></p>
    <p><a href="/accounts/clients/add/">Add Client</a></p>

    <table border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Address</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for client in clients %}
                <tr>
                    <td>{{ client.first_name }} {{ client.last_name }}</td>
                    <td>{{ client.phone }}</td>
                    <td>{{ client.email }}</td>
                    <td>{{ client.address }}</td>
                    <td>{{ client.is_active }}</td>
                    <td>
                        <a href="/accounts/clients/{{ client.id }}/edit/">Edit</a>
                        <a href="/accounts/clients/{{ client.id }}/delete/">Delete</a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="6">No clients yet.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
