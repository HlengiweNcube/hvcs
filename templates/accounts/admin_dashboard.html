{% extends "base.html" %}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}
    <h1 class="page-title">Admin Dashboard</h1>
    <p class="page-text">Welcome, {{ request.user.username }}.</p>
    <p class="page-text">This is the admin dashboard placeholder for HVCS.</p>
    <div class="link-row">
        <a class="link-button" href="/accounts/clients/">Manage Clients (CRUD)</a>
        <a class="link-button" href="/accounts/caregivers/">Manage Caregivers (CRUD)</a>
        <a class="button-link" href="/admin/">Open Django Admin</a>
        <form method="post" action="/accounts/logout/" style="display:inline">{% csrf_token %}<button type="submit" class="button-link">Logout</button></form>
    </div>
{% endblock %}
